    <!-- Splash screen styles (inline so it renders before the JS bundle) -->
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #0b0f1a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 22px;
        transition: opacity 0.55s ease, visibility 0.55s;
      }
      #splash.splash-hide { opacity: 0; visibility: hidden; pointer-events: none; }
      #splash::before {
        content: ""; position: absolute; width: 420px; height: 420px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(250, 204, 21, 0.14), transparent 65%);
        animation: splashPulse 2.2s ease-in-out infinite;
      }
      .splash-logo {
        width: 92px; height: 92px; position: relative;
        animation: splashPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                   splashFloat 2.6s ease-in-out 0.7s infinite;
        filter: drop-shadow(0 0 26px rgba(250, 204, 21, 0.45));
      }
      .splash-name {
        font-family: "Nunito", system-ui, sans-serif;
        font-size: 2.1rem; font-weight: 800; color: #e6ebf5;
        letter-spacing: -0.5px; position: relative;
        animation: splashFade 0.6s ease 0.25s both;
      }
      .splash-name b {
        background: linear-gradient(90deg, #facc15, #38bdf8);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .splash-tag {
        font-family: "JetBrains Mono", monospace; font-size: 0.85rem;
        color: #94a3b8; position: relative;
        animation: splashFade 0.6s ease 0.45s both;
      }
      .splash-bar {
        width: 190px; height: 4px; border-radius: 100px;
        background: #1a2438; overflow: hidden; position: relative;
        animation: splashFade 0.6s ease 0.6s both;
      }
      .splash-bar::after {
        content: ""; position: absolute; top: 0; left: -40%;
        width: 40%; height: 100%; border-radius: 100px;
        background: linear-gradient(90deg, #facc15, #38bdf8);
        animation: splashLoad 1.1s ease-in-out infinite;
      }
      @keyframes splashPop {
        from { transform: scale(0.3) rotate(-14deg); opacity: 0; }
        to { transform: scale(1) rotate(0); opacity: 1; }
      }
      @keyframes splashFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-9px); }
      }
      @keyframes splashFade {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.15); opacity: 1; }
      }
      @keyframes splashLoad {
        0% { left: -40%; }
        50% { left: 50%; width: 55%; }
        100% { left: 105%; width: 40%; }
      }
    </style>
